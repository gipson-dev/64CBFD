name: build_pr

on:
  pull_request_target:
    branches: [master]

jobs:
  build_pr:
    if: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
    runs-on: ubuntu-latest
    env:
      PRIVATE_REPO_ACCESS: ${{ secrets.PRIVATE_REPO_ACCESS }}
      CONKER_BASEROM_US: ${{ secrets.CONKER_BASEROM_US }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v7
        with:
          submodules: recursive
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
      - name: Check baserom secrets
        if: ${{ env.PRIVATE_REPO_ACCESS == '' || env.CONKER_BASEROM_US == '' }}
        run: |
          echo "::notice::Skipping ROM build because PRIVATE_REPO_ACCESS and/or CONKER_BASEROM_US is not configured."
          echo "::notice::Add those repository secrets to enable the baserom checkout and full matching build."
      - name: Checkout baserom
        if: ${{ env.PRIVATE_REPO_ACCESS != '' && env.CONKER_BASEROM_US != '' }}
        uses: actions/checkout@v7
        with:
          repository: mkst/conker-private
          token: ${{ env.PRIVATE_REPO_ACCESS }}
          path: baserom
          persist-credentials: false
      - name: Decrypt baserom
        if: ${{ env.PRIVATE_REPO_ACCESS != '' && env.CONKER_BASEROM_US != '' }}
        run: echo "${CONKER_BASEROM_US}" | openssl enc -d -aes-256-cbc -pass stdin -pbkdf2 -in baserom/baserom.us.z64.aes -out baserom.us.z64

      - name: Perform make extract (rom)
        if: ${{ env.PRIVATE_REPO_ACCESS != '' && env.CONKER_BASEROM_US != '' }}
        uses: docker://ghcr.io/mkst/conker:latest
        with:
          args: make extract

      - name: Perform make extract (code)
        if: ${{ env.PRIVATE_REPO_ACCESS != '' && env.CONKER_BASEROM_US != '' }}
        uses: docker://ghcr.io/mkst/conker:latest
        with:
          args: sh -c "cd conker && make extract"
      - name: Perform make (code)
        if: ${{ env.PRIVATE_REPO_ACCESS != '' && env.CONKER_BASEROM_US != '' }}
        uses: docker://ghcr.io/mkst/conker:latest
        with:
          args: sh -c "cd conker && make --jobs"
      - name: Perform make replace
        if: ${{ env.PRIVATE_REPO_ACCESS != '' && env.CONKER_BASEROM_US != '' }}
        uses: docker://ghcr.io/mkst/conker:latest
        with:
          args: sh -c "cd conker && make replace"

      - name: Perform make
        if: ${{ env.PRIVATE_REPO_ACCESS != '' && env.CONKER_BASEROM_US != '' }}
        uses: docker://ghcr.io/mkst/conker:latest
        with:
          args: make --jobs
